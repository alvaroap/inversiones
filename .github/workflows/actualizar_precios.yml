name: Actualización Diaria de Precios

on:
  schedule:
    - cron: '0 22 * * *' # Se ejecuta cada noche a las 22:00
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    # Permisos necesarios para que el bot pueda hacer 'git push'
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: pip install yfinance

      - name: Ejecutar script de actualización
        # El flag --auto indica al script que no pida inputs manuales
        run: python actualizar.py --auto

      - name: Guardar cambios en GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add datos.json
          # El comando || exit 0 evita que el workflow falle si no hay cambios en los precios
          git commit -m "🤖 Actualización automática de precios mercado: $(date +'%d/%m/%Y')" || exit 0
          git push
